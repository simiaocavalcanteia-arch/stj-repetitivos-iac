name: Atualizar dados STJ

on:
  schedule:
    - cron: '0 9 * * 1'  # Segunda-feira às 9h UTC (6h BRT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extrair dados do STJ
        run: python atualizar.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Atualização automática dos dados STJ - $(date +'%d/%m/%Y')"
          git push
